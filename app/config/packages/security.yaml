security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_player_provider:
            entity:
                class: App\Domain\Player\Entity\Player
                property: login

    role_hierarchy:
        ROLE_MODERATOR: ROLE_PLAYER
        ROLE_SERVER_ADMIN: ROLE_PLAYER
        ROLE_ADMIN: [ROLE_MODERATOR, ROLE_SERVER_ADMIN]
        ROLE_SUPER_ADMIN: ROLE_ADMIN

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_player_provider
            user_checker: App\Infrastructure\Security\PlayerChecker
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: login
                password_parameter: password
                default_target_path: app_home
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week
                path: /

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/activate, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/profile, roles: ROLE_PLAYER }
        - { path: ^/(fr|en)?/admin, roles: [ROLE_ADMIN, ROLE_MODERATOR, ROLE_SERVER_ADMIN] }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
