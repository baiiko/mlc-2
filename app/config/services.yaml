# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/**/Entity/'
            - '../src/Kernel.php'

    # Interface bindings - Domain
    App\Domain\Player\Repository\PlayerRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePlayerRepository

    # Interface bindings - Application
    App\Application\Player\Handler\RegisterPlayerHandlerInterface:
        class: App\Application\Player\Handler\RegisterPlayerHandler

    App\Application\Player\Service\RegisterPlayerServiceInterface:
        class: App\Application\Player\Service\RegisterPlayerService

    App\Application\Player\Notification\PlayerNotificationInterface:
        class: App\Infrastructure\Mail\PlayerMailer

    App\Application\Player\Service\ActivateAccountServiceInterface:
        class: App\Application\Player\Service\ActivateAccountService

    App\Application\Player\Service\CloseAccountServiceInterface:
        class: App\Application\Player\Service\CloseAccountService

    App\Application\Player\Service\UpdateProfileServiceInterface:
        class: App\Application\Player\Service\UpdateProfileService

    App\Application\Player\Service\ChangePasswordServiceInterface:
        class: App\Application\Player\Service\ChangePasswordService

    App\Application\Player\Service\PasswordResetServiceInterface:
        class: App\Application\Player\Service\PasswordResetService

    App\Application\Player\Service\RoleManagementServiceInterface:
        class: App\Application\Player\Service\RoleManagementService

    # Interface bindings - Team
    App\Domain\Team\Repository\TeamRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineTeamRepository

    App\Application\Team\Service\CreateTeamServiceInterface:
        class: App\Application\Team\Service\CreateTeamService

    App\Application\Team\Service\CloseTeamServiceInterface:
        class: App\Application\Team\Service\CloseTeamService

    App\Application\Team\Service\TransferOwnershipServiceInterface:
        class: App\Application\Team\Service\TransferOwnershipService

    App\Application\Team\Service\UpdateTeamServiceInterface:
        class: App\Application\Team\Service\UpdateTeamService

    App\Application\Team\Service\HandleJoinRequestServiceInterface:
        class: App\Application\Team\Service\HandleJoinRequestService

    App\Application\Team\Service\JoinTeamServiceInterface:
        class: App\Application\Team\Service\JoinTeamService

    App\Domain\Team\Repository\TeamJoinRequestRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineTeamJoinRequestRepository

    App\Domain\Team\Repository\TeamMembershipRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineTeamMembershipRepository

    # Interface bindings - Championship
    App\Domain\Championship\Repository\SeasonRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSeasonRepository

    App\Domain\Championship\Repository\RoundRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineRoundRepository

    App\Domain\Championship\Repository\PhaseRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePhaseRepository

    App\Domain\Championship\Repository\RoundRegistrationRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineRoundRegistrationRepository

    App\Domain\Championship\Repository\PhaseResultRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePhaseResultRepository

    App\Domain\Championship\Repository\MapRecordRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineMapRecordRepository

    App\Domain\Championship\Repository\ServerRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineServerRepository

    # Interface bindings - Content
    App\Domain\Content\Repository\RuleRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineRuleRepository

    App\Application\Championship\Service\RegisterToRoundServiceInterface:
        class: App\Application\Championship\Service\RegisterToRoundService

    App\Application\Championship\Service\CalculateRankingServiceInterface:
        class: App\Application\Championship\Service\CalculateRankingService

    App\Application\Championship\Service\UpdateAvailabilityServiceInterface:
        class: App\Application\Championship\Service\UpdateAvailabilityService

    App\Application\Championship\Service\RoundDataServiceInterface:
        class: App\Application\Championship\Service\RoundDataService

    App\Application\Championship\Service\ServerApiDataServiceInterface:
        class: App\Application\Championship\Service\ServerApiDataService

    App\Application\Championship\Service\RoundMapService:
        arguments:
            $publicDir: '%kernel.project_dir%/public'

    App\Application\Championship\Service\MatchSettingsGeneratorService:
        arguments:
            $matchSettingsPath: '%env(resolve:MATCHSETTINGS_PATH)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
